# Deploy production to Vercel (CLI from GitHub runners; avoids local network/timeouts).
#
# Required repository secrets (Vercel → Project → Settings → General → IDs; Account → Tokens):
#   VERCEL_TOKEN
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID
#
# Run: Actions → "Deploy to Vercel" → Run workflow.
name: Deploy to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run vercel:sync
      - name: Deploy to production
        run: npx vercel deploy --prod --yes --archive tgz --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
